<ion-menu contentId="tabs-main" menuId="main-menu" side="start" type="overlay">
  <div class="menu-wrap">

    <!-- Brand -->
    <div class="menu-brand">
      <div class="brand-icon-wrap">
        <ion-icon name="cube-outline"></ion-icon>
      </div>
      <div class="brand-text">
        <span class="brand-name">ItemFlow</span>
        <span class="brand-sub">Gestión PyME</span>
      </div>
    </div>

    <div class="menu-divider"></div>

    <!-- Nav -->
    <p class="nav-label">Menú principal</p>
    <ion-list lines="none" class="menu-list">

      <ion-item button class="menu-item" routerLink="/tabs/catalog"
        routerLinkActive="active-item" (click)="closeMenu()">
        <ion-icon name="cube-outline" slot="start"></ion-icon>
        <ion-label>Catálogo</ion-label>
      </ion-item>

      <ion-item button class="menu-item" routerLink="/tabs/inventory"
        routerLinkActive="active-item" (click)="closeMenu()">
        <ion-icon name="layers-outline" slot="start"></ion-icon>
        <ion-label>Inventario</ion-label>
      </ion-item>

      <ion-item button class="menu-item" routerLink="/tabs/predictions"
        routerLinkActive="active-item" (click)="closeMenu()">
        <ion-icon name="calendar-outline" slot="start"></ion-icon>
        <ion-label>Calendario de Compras</ion-label>
      </ion-item>

      <ion-item button class="menu-item" routerLink="/tabs/projection"
        routerLinkActive="active-item" (click)="closeMenu()">
        <ion-icon name="trending-up-outline" slot="start"></ion-icon>
        <ion-label>Proyección de Stock</ion-label>
      </ion-item>

      <ion-item button class="menu-item" routerLink="/tabs/alerts"
        routerLinkActive="active-item" (click)="closeMenu()">
        <ion-icon name="notifications-outline" slot="start"></ion-icon>
        <ion-label>
          Alertas
          <span *ngIf="alertCount > 0" class="menu-badge">{{ alertCount }}</span>
        </ion-label>
      </ion-item>

    </ion-list>

    <div class="menu-divider"></div>
    <p class="nav-label">Sistema</p>
    <ion-list lines="none" class="menu-list">
      <ion-item button class="menu-item" routerLink="/tabs/more"
        routerLinkActive="active-item" (click)="closeMenu()">
        <ion-icon name="settings-outline" slot="start"></ion-icon>
        <ion-label>Configuración</ion-label>
      </ion-item>
    </ion-list>

    <!-- Footer user chip -->
    <div style="flex:1"></div>
    <div class="menu-footer">
      <div class="user-chip">
        <div class="user-avatar"><ion-icon name="person-outline"></ion-icon></div>
        <div class="user-info">
          <span class="user-name">Administrador</span>
          <span class="user-role">Admin</span>
        </div>
      </div>
    </div>

  </div>
</ion-menu>

<!-- Tabs (mobile navigation) -->
<ion-tabs id="tabs-main">
  <ion-tab-bar slot="bottom" class="mobile-tab-bar">

    <ion-tab-button tab="catalog" href="/tabs/catalog">
      <ion-icon name="cube-outline"></ion-icon>
      <ion-label>Catálogo</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="inventory" href="/tabs/inventory">
      <ion-icon name="layers-outline"></ion-icon>
      <ion-label>Inventario</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="predictions" href="/tabs/predictions">
      <ion-icon name="calendar-outline"></ion-icon>
      <ion-label>Calendario</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="projection" href="/tabs/projection">
      <ion-icon name="trending-up-outline"></ion-icon>
      <ion-label>Proyección</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="alerts" href="/tabs/alerts">
      <ion-icon name="notifications-outline"></ion-icon>
      <ion-label>Alertas</ion-label>
      <ion-badge *ngIf="alertCount > 0" color="danger">{{ alertCount }}</ion-badge>
    </ion-tab-button>

    <ion-tab-button tab="more" href="/tabs/more">
      <ion-icon name="settings-outline"></ion-icon>
      <ion-label>Más</ion-label>
    </ion-tab-button>

  </ion-tab-bar>
</ion-tabs>
