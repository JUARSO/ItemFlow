<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button class="hamburger-btn" (click)="openMenu()">
        <ion-icon slot="icon-only" name="menu-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Configuración</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="more-content">

  <!-- ── Apariencia ─────────────────────────────────────────── -->
  <div class="section-header"><h3>Apariencia</h3></div>
  <div class="menu-list">
    <div class="menu-item" (click)="navigateTo('/tabs/more/themes')">
      <div class="menu-icon" [style.background]="activeThemeColor + '22'" [style.color]="activeThemeColor">
        <ion-icon name="color-palette-outline"></ion-icon>
      </div>
      <div class="menu-text">
        <span class="menu-label">Tema de color</span>
        <span class="menu-desc">Activo: {{ activeThemeLabel }}</span>
      </div>
      <div class="theme-dot-preview" [style.background]="activeThemeColor"></div>
      <ion-icon name="chevron-forward" class="menu-chevron"></ion-icon>
    </div>
  </div>

  <!-- ── Accesos rápidos ─────────────────────────────────────── -->
  <div class="section-header"><h3>Accesos rápidos</h3></div>
  <div class="menu-list">
    <div class="menu-item" *ngFor="let item of menuItems" (click)="navigateTo(item.route)">
      <div class="menu-icon" [style.background]="item.color + '1A'" [style.color]="item.color">
        <ion-icon [name]="item.icon"></ion-icon>
      </div>
      <div class="menu-text">
        <span class="menu-label">{{ item.label }}</span>
        <span class="menu-desc">{{ item.desc }}</span>
      </div>
      <ion-icon name="chevron-forward" class="menu-chevron"></ion-icon>
    </div>
  </div>

  <!-- ── Información ─────────────────────────────────────────── -->
  <div class="section-header"><h3>Información</h3></div>
  <div class="info-list">
    <div class="info-item">
      <ion-icon name="layers-outline" style="color:var(--ion-color-primary)"></ion-icon>
      <div class="info-text">
        <span>ItemFlow</span>
        <span class="info-val">Versión 1.0.0 (MVP)</span>
      </div>
    </div>
    <div class="info-item">
      <ion-icon name="time-outline" style="color:#64748B"></ion-icon>
      <div class="info-text">
        <span>Sesión expira en</span>
        <span class="info-val">90 minutos de inactividad</span>
      </div>
    </div>
    <div class="info-item">
      <ion-icon name="server-outline" style="color:#059669"></ion-icon>
      <div class="info-text">
        <span>Última sincronización</span>
        <span class="info-val">Hoy, 24 Abr 2026 · 10:30</span>
      </div>
    </div>
  </div>

  <!-- ── Cerrar sesión ─────────────────────────────────────────── -->
  <ion-button expand="block" fill="outline" color="danger" style="margin:16px" (click)="confirmLogout()">
    <ion-icon name="log-out-outline" slot="start"></ion-icon>
    Cerrar sesión
  </ion-button>

  <div style="height:16px"></div>
</ion-content>
